name: Resy Snipe

on:
  workflow_dispatch:
    inputs:
      venue_url:
        description: 'Resy URL (e.g. https://resy.com/cities/new-york-ny/venues/lilia)'
        required: true
        type: string
      reservation_date:
        description: 'Date you want to eat (YYYY-MM-DD)'
        required: true
        type: string
      time_window:
        description: 'Desired time window (HH:MM-HH:MM, e.g. 19:00-21:00)'
        required: true
        type: string
      drop_date:
        description: 'Date reservations open (YYYY-MM-DD)'
        required: true
        type: string
      drop_time:
        description: 'Time reservations open (HH:MM, e.g. 09:00)'
        required: true
        type: string
      party_size:
        description: 'Party size'
        required: false
        default: '2'
        type: string
      timezone:
        description: 'Restaurant timezone (e.g. America/New_York)'
        required: false
        default: 'America/New_York'
        type: string

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RESY_EMAIL: ${{ secrets.RESY_EMAIL }}
      RESY_PASSWORD: ${{ secrets.RESY_PASSWORD }}
      TZ: ${{ inputs.timezone }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sniper
        env:
          INPUT_URL: ${{ inputs.venue_url }}
          INPUT_DATE: ${{ inputs.reservation_date }}
          INPUT_TIME: ${{ inputs.time_window }}
          INPUT_DROP_DATE: ${{ inputs.drop_date }}
          INPUT_DROP_TIME: ${{ inputs.drop_time }}
          INPUT_PARTY_SIZE: ${{ inputs.party_size }}
        run: |
          python run_snipe.py \
            --url "$INPUT_URL" \
            --date "$INPUT_DATE" \
            --time "$INPUT_TIME" \
            --drop-date "$INPUT_DROP_DATE" \
            --drop-time "$INPUT_DROP_TIME" \
            --party-size "$INPUT_PARTY_SIZE"
