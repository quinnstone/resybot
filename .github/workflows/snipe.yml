name: Resy Snipe

on:
  workflow_dispatch:
    inputs:
      venue_url:
        description: 'Resy URL (e.g. https://resy.com/cities/new-york-ny/venues/lilia)'
        required: true
        type: string
      target_date:
        description: 'Reservation date (YYYY-MM-DD)'
        required: true
        type: string
      drop_date:
        description: 'Date reservations drop (YYYY-MM-DD). Leave blank to auto-calculate.'
        required: false
        type: string
      time_window:
        description: 'Desired time window (HH:MM-HH:MM, e.g. 19:00-21:00)'
        required: true
        type: string
      party_size:
        description: 'Party size'
        required: false
        default: '2'
        type: string

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RESY_EMAIL: ${{ secrets.RESY_EMAIL }}
      RESY_PASSWORD: ${{ secrets.RESY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sniper
        env:
          INPUT_URL: ${{ inputs.venue_url }}
          INPUT_DATE: ${{ inputs.target_date }}
          INPUT_DROP_DATE: ${{ inputs.drop_date }}
          INPUT_TIME: ${{ inputs.time_window }}
          INPUT_PARTY_SIZE: ${{ inputs.party_size }}
        run: |
          ARGS="--url $INPUT_URL --date $INPUT_DATE --time $INPUT_TIME --party-size $INPUT_PARTY_SIZE"
          if [ -n "$INPUT_DROP_DATE" ]; then
            ARGS="$ARGS --drop-date $INPUT_DROP_DATE"
          fi
          python run_snipe.py $ARGS
